<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FX Monitor - USD/JPY</title>

  <style>
    :root {
      --bg: #05070a;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #2f8cff;
      --up: #22c55e;
      --down: #ef4444;
      --warn: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .screen {
      width: 100vw;
      height: 100vh;
      padding: 28px 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at 18% 18%, rgba(47, 140, 255, 0.24), transparent 36%),
        radial-gradient(circle at 82% 72%, rgba(34, 197, 94, 0.10), transparent 34%),
        var(--bg);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .title {
      color: var(--muted);
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 900;
      letter-spacing: 0.16em;
      line-height: 1;
    }

    .pair {
      margin-top: 10px;
      font-size: clamp(56px, 7vw, 104px);
      font-weight: 950;
      letter-spacing: 0.03em;
      line-height: 0.92;
    }

    .badge {
      color: var(--accent);
      font-size: clamp(20px, 2.6vw, 34px);
      font-weight: 900;
      letter-spacing: 0.14em;
    }

    .main {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rate {
      font-size: clamp(180px, 31vw, 520px);
      font-weight: 950;
      line-height: 0.82;
      letter-spacing: -0.085em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 38px rgba(47, 140, 255, 0.20);
      transform: translateX(-0.04em);
      white-space: nowrap;
    }

    .rate.loading {
      color: var(--muted);
      letter-spacing: -0.03em;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 24px;
      color: var(--muted);
      font-size: clamp(20px, 2.2vw, 34px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .change {
      justify-self: start;
    }

    .source {
      justify-self: center;
      color: var(--muted);
      opacity: 0.75;
      font-size: clamp(16px, 1.6vw, 24px);
      text-align: center;
    }

    .updated {
      justify-self: end;
      text-align: right;
    }

    .up {
      color: var(--up);
    }

    .down {
      color: var(--down);
    }

    .warn {
      color: var(--warn);
    }

    @media (orientation: portrait) {
      .screen {
        padding: 30px 24px;
      }

      .header {
        flex-direction: column;
      }

      .rate {
        font-size: clamp(120px, 34vw, 260px);
      }

      .footer {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .source,
      .updated {
        justify-self: start;
        text-align: left;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <header class="header">
      <div>
        <div class="title">FX MONITOR</div>
        <div class="pair">USD/JPY</div>
      </div>
      <div id="status" class="badge">LIVE</div>
    </header>

    <section class="main">
      <div id="rate" class="rate loading">---.---</div>
    </section>

    <footer class="footer">
      <div id="change" class="change">Loading...</div>
      <div class="source">open.er-api.com</div>
      <div id="updated" class="updated">--:--:--</div>
    </footer>
  </main>

  <script>
    const rateElement = document.getElementById("rate");
    const changeElement = document.getElementById("change");
    const updatedElement = document.getElementById("updated");
    const statusElement = document.getElementById("status");

    let previousRate = null;

    function setChangeClass(value) {
      changeElement.classList.remove("up", "down", "warn");

      if (value > 0) {
        changeElement.classList.add("up");
      } else if (value < 0) {
        changeElement.classList.add("down");
      }
    }

    async function fetchRate() {
      try {
        const response = await fetch("https://open.er-api.com/v6/latest/USD", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("API response was not ok");
        }

        const data = await response.json();

        if (data.result !== "success" || !data.rates || typeof data.rates.JPY !== "number") {
          throw new Error("Invalid API data");
        }

        const rate = data.rates.JPY;
        rateElement.textContent = rate.toFixed(3);
        rateElement.classList.remove("loading");

        if (previousRate === null) {
          changeElement.textContent = "Waiting for next tick";
          changeElement.classList.remove("up", "down", "warn");
        } else {
          const diff = rate - previousRate;
          const sign = diff >= 0 ? "+" : "";
          changeElement.textContent = `${sign}${diff.toFixed(3)} from last update`;
          setChangeClass(diff);
        }

        previousRate = rate;

        const now = new Date();
        updatedElement.textContent = `Updated ${now.toLocaleTimeString("ja-JP")}`;
        statusElement.textContent = "LIVE";
        statusElement.classList.remove("warn");
      } catch (error) {
        console.error(error);

        statusElement.textContent = "ERROR";
        statusElement.classList.add("warn");

        changeElement.textContent = "Rate fetch failed";
        changeElement.classList.remove("up", "down");
        changeElement.classList.add("warn");

        updatedElement.textContent = "Check API / connection";
      }
    }

    fetchRate();
    setInterval(fetchRate, 60 * 1000);
  </script>
</body>
</html>
