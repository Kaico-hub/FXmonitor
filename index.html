<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>USDJPY</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
      touch-action: manipulation;
      color: #fff;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
    }

    .rate {
      font-size: clamp(120px, 25vw, 210px);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.08em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .rate.loading {
      color: #777;
      letter-spacing: -0.03em;
    }

    .rate.error {
      color: #f59e0b;
      font-size: clamp(72px, 14vw, 220px);
      letter-spacing: 0;
    }

    .rate.stale {
      color: #f59e0b;
    }
  </style>
</head>

<body>
  <main class="screen">
    <div id="rate" class="rate loading">---.---</div>
  </main>

  <script>
    const rateElement = document.getElementById("rate");
    const RATE_API_URL = "https://api.coinbase.com/v2/exchange-rates?currency=USD";
    const POLL_INTERVAL_MS = 60 * 1000;
    const FETCH_TIMEOUT_MS = 8 * 1000;
    let wakeLock = null;
    let hasDisplayedRate = false;

    async function requestWakeLock() {
      if (!("wakeLock" in navigator) || document.visibilityState !== "visible") {
        return;
      }

      try {
        wakeLock = await navigator.wakeLock.request("screen");
      } catch (error) {
        console.warn("Screen Wake Lock was not granted", error);
      }
    }

    async function fetchRate() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const response = await fetch(RATE_API_URL, {
          cache: "no-store",
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("API response was not ok");
        }

        const data = await response.json();
        const rate = Number(data.data?.rates?.JPY);

        if (!Number.isFinite(rate)) {
          throw new Error("Invalid API data");
        }

        rateElement.textContent = rate.toFixed(2);
        rateElement.classList.remove("loading", "error", "stale");
        hasDisplayedRate = true;
      } catch (error) {
        console.error(error);
        if (hasDisplayedRate) {
          rateElement.classList.add("stale");
        } else {
          rateElement.textContent = "ERROR";
          rateElement.classList.remove("loading");
          rateElement.classList.add("error");
        }
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function pollRate() {
      await fetchRate();
      window.setTimeout(pollRate, POLL_INTERVAL_MS);
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        requestWakeLock();
        fetchRate();
      }
    });
    document.addEventListener("pointerdown", requestWakeLock, { passive: true });

    requestWakeLock();
    pollRate();
  </script>
</body>
</html>
