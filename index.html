<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FX Monitor - USD/JPY</title>

  <style>
    :root {
      --bg: #05070a;
      --panel: #0b1018;
      --border: #1c2633;
      --text: #f4f7fb;
      --muted: #94a3b8;
      --accent: #2f8cff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .monitor {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--bg);
    }

    .left,
    .right {
      min-width: 0;
      min-height: 0;
      padding: 14px;
    }

    .left {
      border-right: 1px solid var(--border);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      background:
        radial-gradient(circle at top left, rgba(47, 140, 255, 0.20), transparent 38%),
        var(--panel);
    }

    .right {
      background: #000;
    }

    .label {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .pair {
      margin-top: 4px;
      font-size: clamp(48px, 6vw, 84px);
      font-weight: 900;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .rateArea {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .tickerBox {
      width: 92%;
      height: 46%;
      min-height: 170px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tickerBox .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }

    .tickerBox .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: end;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 26px);
      font-variant-numeric: tabular-nums;
    }

    .status {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .chartBox {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }

    .chartBox .tradingview-widget-container,
    .chartBox .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }

    @media (orientation: portrait) {
      .monitor {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .left {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .tickerBox {
        height: 55%;
      }
    }
  </style>
</head>

<body>
  <main class="monitor">
    <section class="left">
      <div>
        <div class="label">FX MONITOR</div>
        <div class="pair">USD/JPY</div>
      </div>

      <div class="rateArea">
        <div class="tickerBox">
          <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script
              type="text/javascript"
              src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js"
              async>
              {
                "symbol": "FX:USDJPY",
                "width": "100%",
                "isTransparent": true,
                "colorTheme": "dark",
                "locale": "ja"
              }
            </script>
          </div>
        </div>
      </div>

      <div class="footer">
        <div>TradingView quote</div>
        <div class="status">LIVE</div>
      </div>
    </section>

    <section class="right">
      <div class="chartBox">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <script
            type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js"
            async>
            {
              "autosize": true,
              "symbol": "FX:USDJPY",
              "interval": "5",
              "timezone": "Asia/Tokyo",
              "theme": "dark",
              "style": "1",
              "locale": "ja",
              "hide_top_toolbar": false,
              "hide_side_toolbar": true,
              "allow_symbol_change": false,
              "calendar": false,
              "support_host": "https://www.tradingview.com"
            }
          </script>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
