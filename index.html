<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>USDJPY</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    .screen {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
    }

    .rate {
font-size: clamp(160px, 31vw, 540px);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.08em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .rate.loading {
      color: #777;
      letter-spacing: -0.03em;
    }

    .rate.error {
      color: #f59e0b;
      font-size: clamp(72px, 14vw, 220px);
      letter-spacing: 0;
    }
  </style>
</head>

<body>
  <main class="screen">
    <div id="rate" class="rate loading">---.---</div>
  </main>

  <script>
    const rateElement = document.getElementById("rate");

    async function fetchRate() {
      try {
        const response = await fetch("https://open.er-api.com/v6/latest/USD", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("API response was not ok");
        }

        const data = await response.json();

        if (
          data.result !== "success" ||
          !data.rates ||
          typeof data.rates.JPY !== "number"
        ) {
          throw new Error("Invalid API data");
        }

        const rate = data.rates.JPY;

        rateElement.textContent = rate.toFixed(2);
        rateElement.classList.remove("loading", "error");
      } catch (error) {
        console.error(error);
        rateElement.textContent = "ERROR";
        rateElement.classList.remove("loading");
        rateElement.classList.add("error");
      }
    }

    fetchRate();
    setInterval(fetchRate, 60 * 1000);
  </script>
</body>
</html>
